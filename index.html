<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Six20 Partners &mdash; Skills Directory</title>
<style>
:root{--blue:#00aeef;--navy:#004a80;--slate:#434a4f;--white:#fff;--off:#f4f6f8;--border:#dde2e6;--text:#2b3035;--muted:#6b747b;--r:6px;--f:'Montserrat',Arial,sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--f);background:var(--off);color:var(--text);min-height:100vh;}
header{background:var(--navy);padding:28px 40px 24px;display:flex;align-items:flex-end;gap:16px;}
header h1{font-size:1.35rem;font-weight:700;color:var(--white);letter-spacing:.02em;line-height:1;}
header span{font-size:.75rem;font-weight:500;color:var(--blue);letter-spacing:.08em;text-transform:uppercase;}
.hint{background:var(--white);border-bottom:1px solid var(--border);padding:10px 40px;font-size:.78rem;color:var(--muted);}
.hint kbd{background:var(--off);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-family:monospace;font-size:.75rem;color:var(--slate);}
.bar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 40px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
select{padding:9px 32px 9px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--f);font-size:.875rem;color:var(--text);background:var(--off);appearance:none;cursor:pointer;outline:none;}
#cnt{margin-left:auto;font-size:.8rem;color:var(--muted);white-space:nowrap;}
main{padding:28px 40px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;display:flex;flex-direction:column;gap:10px;}
.card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(0,174,239,.10);}
.ct{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.sn{font-size:.95rem;font-weight:700;color:var(--navy);line-height:1.3;}
.bc{font-size:.68rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;background:#e8f5fd;color:var(--navy);}
.slug{font-size:.72rem;color:var(--muted);font-family:monospace;background:var(--off);padding:2px 7px;border-radius:4px;border:1px solid var(--border);display:inline-block;}
.desc{font-size:.82rem;color:var(--slate);line-height:1.55;}
.cm{display:flex;gap:8px;flex-wrap:wrap;padding-top:6px;border-top:1px solid var(--border);}
.tag{font-size:.7rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:4px;}
.ta{background:#e8f5e9;color:#2e7d32;}.tc{background:#fff3e0;color:#e65100;}.to{background:var(--off);color:var(--muted);}
.ts{background:#e8f5fd;color:var(--navy);}.tl{background:#fce4ec;color:#880e4f;}
.req{font-size:.75rem;color:var(--muted);line-height:1.4;}
.req strong{color:var(--slate);font-weight:600;}
#empty{display:none;grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);font-size:.9rem;}
@media(max-width:600px){header,.bar,.hint,main{padding-left:20px;padding-right:20px;}main{grid-template-columns:1fr;}}
</style>
</head>

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}

function go(){
  var cat = document.getElementById("cf").value.toLowerCase();
  var wh  = document.getElementById("wf").value.toLowerCase();
  var st  = document.getElementById("sf").value.toLowerCase();
  var grid = document.getElementById("grid");
  var old = grid.querySelectorAll(".card");
  for(var i=0;i<old.length;i++) old[i].remove();

  var f = SKILLS.filter(function(s){
    if(cat && s.cat.toLowerCase() !== cat) return false;
    if(wh  && s.where.toLowerCase().indexOf(wh) === -1) return false;
    if(st  && s.status.toLowerCase() !== st) return false;
    return true;
  });

  var em  = document.getElementById("empty");
  var cnt = document.getElementById("cnt");

  if(f.length === 0){
    em.style.display = "block";
    cnt.textContent = "0 skills";
  } else {
    em.style.display = "none";
    cnt.textContent = f.length + " skill" + (f.length !== 1 ? "s" : "");
    for(var i=0;i<f.length;i++){
      var s  = f[i];
      var wc = s.where.toLowerCase().indexOf("cowork")   !== -1 ? "tc" :
               s.where.toLowerCase().indexOf("anywhere") !== -1 ? "ta" : "to";
      var sc = s.status.toLowerCase() === "shared" ? "ts" : "tl";
      var d  = document.createElement("div");
      d.className = "card";
      var h = "";
      h += "<div class=\"ct\"><div class=\"sn\">" + esc(s.name) + "</div>";
      if(s.cat) h += "<span class=\"bc\">" + esc(s.cat) + "</span>";
      h += "</div>";
      if(s.slug) h += "<div class=\"slug\">" + esc(s.slug) + "</div>";
      if(s.desc) h += "<div class=\"desc\">" + esc(s.desc) + "</div>";
      h += "<div class=\"cm\">";
      h += "<span class=\"tag " + wc + "\">" + esc(s.where || "—") + "</span>";
      h += "<span class=\"tag " + sc + "\">" + esc(s.status || "—") + "</span>";
      h += "</div>";
      if(s.req) h += "<div class=\"req\"><strong>Requires:</strong> " + esc(s.req) + "</div>";
      d.innerHTML = h;
      grid.appendChild(d);
    }
  }
}

var seen={}, cats=[];
for(var i=0;i<SKILLS.length;i++){var c=SKILLS[i].cat;if(c&&!seen[c]){seen[c]=true;cats.push(c);}}
cats.sort();
var cf=document.getElementById("cf");
for(var i=0;i<cats.length;i++){var o=document.createElement("option");o.value=cats[i].toLowerCase();o.textContent=cats[i];cf.appendChild(o);}

go();
</script>
